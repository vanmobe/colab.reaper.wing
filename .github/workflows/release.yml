name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-package:
    name: Build + Package (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: AUDIOLAB-Virtual-Soundcheck-macOS
          - os: windows-latest
            artifact_name: AUDIOLAB-Virtual-Soundcheck-Windows
          - os: ubuntu-latest
            artifact_name: AUDIOLAB-Virtual-Soundcheck-Linux

    env:
      VERSION: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || '1.1.0-dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch REAPER SDK headers
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p lib/reaper-sdk
          curl -fsSL "https://www.reaper.fm/sdk/plugin/reaper_plugin.h" -o "lib/reaper-sdk/reaper_plugin.h"
          curl -fsSL "https://www.reaper.fm/sdk/plugin/reaper_plugin_functions.h" -o "lib/reaper-sdk/reaper_plugin_functions.h"
          grep -q "REAPER_PLUGIN_ENTRYPOINT" "lib/reaper-sdk/reaper_plugin.h"
          grep -q "REAPERAPI_LoadAPI" "lib/reaper-sdk/reaper_plugin_functions.h"

      - name: Fetch oscpack sources
        shell: bash
        run: |
          set -euo pipefail
          rm -rf lib/oscpack
          git clone --depth 1 https://github.com/RossBencina/oscpack.git lib/oscpack
          test -f "lib/oscpack/osc/OscOutboundPacketStream.h"

      - name: Normalize version
        shell: bash
        run: |
          RAW_VERSION="${VERSION}"
          CLEAN_VERSION="${RAW_VERSION#v}"
          echo "VERSION=${CLEAN_VERSION}" >> "$GITHUB_ENV"

      - name: Configure (CMake)
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        shell: bash
        run: |
          set +e
          cmake --build build --config Release -j 4 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            tail_text="$(tail -n 80 build.log)"
            tail_text="${tail_text//'%'/'%25'}"
            tail_text="${tail_text//$'\n'/'%0A'}"
            tail_text="${tail_text//$'\r'/'%0D'}"
            echo "::error title=Build failed::${tail_text}"
            exit "$status"
          fi

      - name: Stage install
        run: cmake --install build --config Release --prefix stage

      - name: Install Inno Setup
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress -y

      - name: Package macOS installer
        if: runner.os == 'macOS'
        shell: bash
        run: ./packaging/create_installer_macos.sh "$VERSION" stage releases

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: ./packaging/create_installer_windows.ps1 -Version "$env:VERSION" -StageDir stage -OutDir releases

      - name: Package Linux installer
        if: runner.os == 'Linux'
        shell: bash
        run: ./packaging/create_installer_linux.sh "$VERSION" stage releases

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: releases/*
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-package
    runs-on: ubuntu-latest

    steps:
      - name: Download packaged installers
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release with assets
        uses: softprops/action-gh-release@v2
        with:
          name: AUDIOLAB Virtual Soundcheck v${{ github.ref_name }}
          body: |
            AUDIOLAB Virtual Soundcheck release for REAPER + Behringer WING.

            Installers:
            - macOS: `.pkg`
            - Windows: `.exe`
            - Linux: `.deb`

            See installation notes in `INSTALL.md`.
          files: dist/*
          generate_release_notes: true
